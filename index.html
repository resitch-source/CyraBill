<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyraBill</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root{--bg:#0b1120;--card:#151e32;--text:#f8fafc;--accent:#6366f1;--success:#10b981;--danger:#ef4444;--radius:12px;--shadow:0 4px 16px rgba(99,102,241,0.15)}
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
    body{background:var(--bg);color:var(--text);padding:16px;max-width:1200px;margin:0 auto}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    h1{font-size:1.5rem;background:linear-gradient(to right,var(--accent),#818cf8);-webkit-background-clip:text;color:transparent}
    .card{background:var(--card);padding:16px;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px}
    .grid{display:grid;gap:12px;grid-template-columns:1fr}@media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr)}}
    input,select,button{background:#334155;color:white;border:1px solid #475569;padding:12px;border-radius:8px;width:100%;margin-bottom:8px}
    button{cursor:pointer;font-weight:600;transition:0.2s}button:hover{background:var(--accent);border-color:var(--accent)}
    table{width:100%;border-collapse:collapse;margin-top:12px}th,td{padding:10px;text-align:left;border-bottom:1px solid #334155}th{color:#94a3b8}
    .badge{padding:4px 8px;border-radius:20px;font-size:0.8rem}.in{background:#166534;color:#86efac}.out{background:#7f1d1d;color:#fca5a5}
    #toast{position:fixed;bottom:20px;right:20px;padding:12px 16px;background:var(--card);border-radius:8px;display:none;box-shadow:var(--shadow);z-index:100}
    .hidden{display:none!important}.loading{opacity:0.6;pointer-events:none}
    .sim-panel{border:1px solid #6366f133}
  </style>
</head>
<body>
  <!-- Login Modal -->
  <div id="loginModal" class="card" style="max-width:300px;margin:15% auto;text-align:center">
    <h2>🧾 CyraBill</h2>
    <form id="loginForm" style="display:flex;flex-direction:column;gap:8px;margin-top:16px">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="pin" placeholder="PIN" required>
      <button type="submit">Sign In</button>
    </form>
  </div>

  <!-- Main App (hidden until login) -->
  <div id="mainApp" class="hidden">
    <header>
      <h1>🧾 CyraBill</h1>
      <div style="display:flex;gap:8px">
        <button onclick="exportData('csv')">📥 CSV</button>
        <button onclick="logout()">🚪</button>
      </div>
    </header>

    <div class="grid">
      <!-- Quick Add -->
      <div class="card">
        <h3>Quick Add</h3>
        <form id="addForm" style="display:flex;flex-direction:column;gap:8px;margin-top:12px">
          <select id="type"><option value="IN">Cash In</option><option value="OUT">Cash Out</option></select>
          <input type="number" id="amount" placeholder="Amount" step="0.01" required>
          <input type="text" id="desc" placeholder="Description">
          <input type="text" id="category" placeholder="Category (AI auto)">
          <button type="submit">Add Transaction</button>
        </form>
      </div>

      <!-- Digital Payments -->
      <div class="card">
        <h3>💳 Digital Payments</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
          <button onclick="initCheckout(100,'gcash')">GCash</button>
          <button onclick="initCheckout(100,'paymaya')">Maya</button>
          <button onclick="initCheckout(100,'over_the_counter')">Palawan</button>
          <button onclick="initCheckout(100,'bills')">Telco</button>
        </div>
      </div>

      <!-- AI Insights -->
      <div class="card">
        <h3>📊 AI Insights</h3>
        <div id="aiStats" style="margin-top:12px">Loading...</div>
        <button onclick="loadAI()" style="margin-top:8px">Refresh</button>
      </div>
    </div>

    <!-- AI Simulation Lab -->
    <div class="card sim-panel" id="simPanel">
      <h3>🧪 AI Simulation Lab</h3>
      <p style="font-size:0.85rem;color:#94a3b8;margin:4px 0 8px">⚠️ Dry Run: Generates synthetic data only. No live payments triggered.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
        <input type="number" id="simDays" value="30" placeholder="Days" style="flex:1;min-width:80px">
        <input type="number" id="simVol" value="20" placeholder="Daily TX" style="flex:1;min-width:80px">
        <select id="simRisk" style="flex:1;min-width:100px">
          <option value="low">Low Risk</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High Risk</option>
        </select>
        <button onclick="runSim()" style="flex:2;min-width:120px">▶ Run Simulation</button>
      </div>
      <div id="simOutput" style="margin-top:12px"></div>
    </div>

    <div class="card" id="cicoPanel" style="border: 1px solid #10b98144;">
      <h3>💱 CICO Operations</h3>
      <div style="display:flex; gap:8px; margin:12px 0;">
        <button onclick="setCICOMode('IN')" id="btnCICOIn" class="btnCICO active" style="flex:1;">📥 Cash In</button>
        <button onclick="setCICOMode('OUT')" id="btnCICOOut" class="btnCICO" style="flex:1;">📤 Cash Out</button>
      </div>
  
      <div id="cicoForm" style="display:flex; flex-direction:column; gap:8px;">
        <input type="number" id="cicoAmount" placeholder="Amount (₱)" step="0.01" min="50">
        <input type="text" id="cicoAccount" placeholder="GCash/Maya Number (10 digits)">
        <select id="cicoNetwork">
          <option value="GCASH">GCash</option>
          <option value="MAYA">Maya</option>
        </select>
        <input type="text" id="cicoNotes" placeholder="Reference/Notes (optional)">
        <button onclick="processCICO()" id="btnProcessCICO">Process Cash In</button>
      </div>
  
      <div id="cicoStatus" style="margin-top:12px; font-size:0.9rem; color:#94a3b8;">
        <strong>Today:</strong> IN ₱<span id="cicoIn">0</span> | OUT ₱<span id="cicoOut">0</span> | Float ₱<span id="cicoFloat">0</span>
      </div>
  </div>

<style>
  .btnCICO { background:#334155; color:#94a3b8; border:1px solid #475569; }
  .btnCICO.active { background:#10b981; color:white; border-color:#059669; }
  #cicoPanel button:hover { opacity:0.9; }
</style>

    
    <!-- Transactions Table -->
    <div class="card">
      <h3>Recent Transactions</h3>
      <div style="overflow-x:auto">
        <table id="txTable">
          <thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Category</th><th>Status</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
